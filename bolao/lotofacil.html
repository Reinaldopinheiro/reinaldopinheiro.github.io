<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lotofacil v1.0 - Reinaldo Pinheiro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 5px; }
        .container { max-width: 1050px; margin: auto; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; margin-bottom: 10px; }
        h2 { color: #1a5276; font-size: 1.1em; text-transform: uppercase; margin: 0; }
        .v-meta { font-size: 0.65em; color: #999; }

        .panel { background: #f8fbff; border: 1px solid #d1d9e6; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .form-group { display: flex; gap: 5px; justify-content: center; margin-bottom: 8px; }
        
        input { padding: 6px; border: 1px solid #bdc3c7; border-radius: 4px; font-size: 0.85em; }
        .btn { padding: 6px 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.7em; }
        .btn-add { background: #27ae60; color: white; }
        .btn-save { background: #2980b9; color: white; }
        .btn-html { background: #e67e22; color: white; }
        .btn-del { background: #e74c3c; color: white; padding: 2px 5px; font-size: 0.8em; }

        /* Alterado para auto para que as colunas se ajustem ao conteúdo */
        table { width: 100%; border-collapse: collapse; table-layout: auto; }
        th { background: #34495e; color: white; padding: 5px 1px; font-size: 0.7em; }
        td { border-bottom: 1px solid #eee; padding: 4px 0px; text-align: center; font-size: 0.85em; }
        
        .col-id { width: 25px; color: #999; }

        /* AJUSTE SOLICITADO: Espaço de 10 caracteres entre nome e números */
        .col-nome { 
            text-align: left; 
            padding-left: 5px; 
            padding-right: 10ch; /* Cria o vácuo de exatamente 10 caracteres */
            font-weight: 500; 
            white-space: nowrap; 
            width: 1%; /* Força a coluna a ocupar o mínimo possível antes do padding */
        }

        .col-num { width: 25px; }
        .col-pts { width: 40px; font-weight: bold; background: #f9f9f9; color: #27ae60; border-left: 1px solid #eee; }
        .col-acao { width: 35px; }

        .acerto { background: #27ae60 !important; color: white !important; font-weight: bold; border-radius: 2px; }
        #info-res { font-weight: bold; color: #2c3e50; padding: 8px; background: #fffde7; border-radius: 4px; display: none; font-size: 0.85em; margin-bottom: 10px; border: 1px solid #f9e79f; }

        footer { margin-top: 20px; font-size: 0.65em; text-align: center; color: #aaa; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body onload="checkAutoLoad()">

<div class="container">
    <div class="header">
        <h2>Lotofacil v1.0 - Reinaldo Pinheiro</h2>
        <span class="v-meta">Build 2026 | RP Consultoria</span>
    </div>

    <div id="info-res"></div>

    <div class="panel">
        <div class="form-group">
            <input type="text" id="novoNome" placeholder="Nome do Participante" maxlength="40" style="width: 200px;">
            <input type="text" id="novosNums" placeholder="01,02,03... (15 números)" style="width: 320px;">
            <button class="btn btn-add" onclick="adicionarAposta()">+ Incluir</button>
        </div>

        <div style="display: flex; justify-content: center; gap: 5px;">
            <input type="file" id="inputRpc" accept=".rpc, .txt" style="display:none" onchange="importarArquivo(this)">
            <button class="btn" style="background:#bdc3c7" onclick="document.getElementById('inputRpc').click()">📂 Abrir .RPC</button>
            <button class="btn btn-save" onclick="exportarArquivo('apostas_lotofacil.rpc')">💾 Salvar .RPC</button>
            <button class="btn btn-html" onclick="gerarRelatorioHTML()">📄 Gerar HTML</button>
            <input type="number" id="cID" placeholder="Concurso" style="width: 80px; padding: 4px;">
            <button class="btn" style="background:#34495e; color:white;" onclick="buscarResultado()">Conferir</button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th class="col-id">ID</th>
                <th class="col-nome">Participante</th>
                <script>
                    for(let i=1; i<=15; i++) document.write(`<th class="col-num">${i}</th>`);
                </script>
                <th class="col-pts">Pts</th>
                <th class="col-acao"></th>
            </tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
    </table>

    <footer>
        &copy; 2026 Reinaldo Pinheiro Consultoria | Pix: doe@reinaldopinheiro.com.br
    </footer>
</div>

<script>
    let db_apostas = [];
    let sorteioAtual = [];
    let concursoInfo = "";

    function checkAutoLoad() {
        const saved = localStorage.getItem('bolao_data_rp_loto_v1');
        if (saved) {
            db_apostas = JSON.parse(saved);
            renderizar();
        }
    }

    function saveAndRender() {
        localStorage.setItem('bolao_data_rp_loto_v1', JSON.stringify(db_apostas));
        renderizar();
    }

    function adicionarAposta() {
        const nome = document.getElementById('novoNome').value.trim();
        const numsRaw = document.getElementById('novosNums').value;
        let dezenas = processarNumeros(numsRaw);

        if(nome === "" || dezenas.length !== 15) {
            return alert("Insira o nome e exatamente 15 números (de 01 a 25).");
        }

        db_apostas.push({ nome, dezenas });
        document.getElementById('novoNome').value = "";
        document.getElementById('novosNums').value = "";
        saveAndRender();
    }

    function processarNumeros(texto) {
        return texto.split(/[,\s.;-]+/)
                    .map(n => parseInt(n.trim()))
                    .filter(n => !isNaN(n) && n >= 1 && n <= 25)
                    .filter((value, index, self) => self.indexOf(value) === index)
                    .sort((a, b) => a - b);
    }

    function renderizar() {
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = "";
        
        db_apostas.forEach((item, idx) => {
            let acertos = 0;
            if (sorteioAtual.length > 0) {
                acertos = item.dezenas.filter(n => sorteioAtual.includes(n)).length;
            }

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="col-id">${idx + 1}</td>
                <td class="col-nome" contenteditable="true" onblur="editarNome(${idx}, this)">${item.nome}</td>
                ${item.dezenas.map(n => {
                    const cl = sorteioAtual.includes(n) ? 'acerto' : '';
                    return `<td class="col-num ${cl}">${n < 10 ? '0'+n : n}</td>`;
                }).join('')}
                <td class="col-pts">${sorteioAtual.length > 0 ? acertos : '-'}</td>
                <td class="col-acao"><button class="btn btn-del" onclick="excluir(${idx})">×</button></td>
            `;
            corpo.appendChild(tr);
        });
    }

    async function buscarResultado() {
        const conc = document.getElementById('cID').value || 'latest';
        const info = document.getElementById('info-res');
        info.style.display = "block"; info.innerHTML = "Consultando API...";
        try {
            const response = await fetch(`https://loteriascaixa-api.herokuapp.com/api/lotofacil/${conc}`);
            const data = await response.json();
            sorteioAtual = data.dezenas.map(n => parseInt(n));
            concursoInfo = `Concurso ${data.concurso} (${data.data})`;
            info.innerHTML = `✅ ${concursoInfo}: ${data.dezenas.join(' - ')}`;
            renderizar();
        } catch (e) { 
            info.innerHTML = "❌ Erro ao buscar resultado. Tente novamente."; 
        }
    }

    function editarNome(idx, el) {
        db_apostas[idx].nome = el.innerText.trim();
        saveAndRender();
    }

    function excluir(idx) {
        if(confirm("Excluir esta aposta?")) { 
            db_apostas.splice(idx, 1); 
            saveAndRender(); 
        }
    }

    function exportarArquivo(nomeFinal) {
        if(!db_apostas.length) return alert("Nada para salvar.");
        let txt = "";
        db_apostas.forEach((item) => {
            txt += `${item.nome}, ${item.dezenas.map(n => n < 10 ? '0'+n : n).join(', ')}\n`;
        });
        const blob = new Blob([txt], { type: 'text/plain' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = nomeFinal;
        link.click();
    }

    function importarArquivo(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const linhas = e.target.result.split('\n');
            let carregados = [];
            linhas.forEach((linha) => {
                if(linha.trim() === "") return;
                const partes = linha.split(',');
                const nome = partes[0].trim();
                const restoDaLinha = partes.slice(1).join(',');
                const dezenas = processarNumeros(restoDaLinha);
                if(nome !== "" && dezenas.length === 15) {
                    carregados.push({ nome, dezenas });
                }
            });
            if(carregados.length > 0) {
                db_apostas = carregados;
                saveAndRender();
                alert(`${carregados.length} apostas carregadas!`);
            }
        };
        reader.readAsText(file);
    }

    function gerarRelatorioHTML() {
        if(!db_apostas.length) return;
        const dataF = new Date().toLocaleDateString('pt-BR').replace(/\//g, '_');
        let html = `<html><head><meta charset="UTF-8"><style>
            body { font-family: sans-serif; font-size: 11px; }
            table { width: 100%; border-collapse: collapse; margin-top: 10px; }
            th, td { border: 1px solid #ccc; padding: 4px; text-align: center; }
            th { background: #34495e; color: white; }
            .acerto { background: #d4edda; font-weight: bold; color: #155724; }
            .nome { text-align: left; padding-left: 10px; padding-right: 10ch; }
        </style></head><body>
        <h2>Lotofacil v1.0 - Relatório</h2>
        <p><strong>Resultado:</strong> ${concursoInfo}</p>
        <table><tr><th>Nº</th><th class="nome">Participante</th><th colspan="15">Dezenas</th><th>Acertos</th></tr>`;
        db_apostas.forEach((item, idx) => {
            let pts = item.dezenas.filter(n => sorteioAtual.includes(n)).length;
            html += `<tr><td>${idx+1}</td><td class="nome">${item.nome}</td>
            ${item.dezenas.map(n => `<td class="${sorteioAtual.includes(n)?'acerto':''}">${n<10?'0'+n:n}</td>`).join('')}
            <td style="font-weight:bold; background:#f8f9fa;">${pts}</td></tr>`;
        });
        html += `</table></body></html>`;
        const blob = new Blob([html], { type: 'text/html' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `Relatorio_Lotofacil_${dataF}.html`;
        link.click();
    }
</script>
</body>
</html>
