<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conferidor de Bolão - Quina</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; min-height: 400px; }
        
        h2 { color: #260056; margin-top: 0; }
        .resultado-input { background: #f3e5f5; padding: 20px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #e1bee7; }
        
        input[type="number"] { width: 55px; padding: 10px; margin: 3px; text-align: center; border: 2px solid #ddd; border-radius: 6px; font-weight: bold; }
        
        button { background: #6a1b9a; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-right: 10px; }
        button:hover { background: #4a148c; }
        .btn-download { background: #00796b; }
        .btn-download:hover { background: #004d40; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: center; }
        th { background-color: #f8f9fa; color: #555; }
        
        .acerto { background-color: #9c27b0 !important; color: white; font-weight: bold; border-radius: 4px; }
        .pontos-col { font-weight: bold; color: #e74c3c; font-size: 1.1em; }
        
        .footer-copy { 
            position: absolute; 
            bottom: 10px; 
            right: 20px; 
            font-size: 10px; 
            color: #999; 
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>CONFERIDOR DE BOLÃO - QUINA</h2>
    
    <div class="resultado-input">
        <strong>RESULTADO OFICIAL (5 NÚMEROS):</strong><br><br>
        <input type="number" class="res-num" placeholder="00" min="1" max="80">
        <input type="number" class="res-num" placeholder="00" min="1" max="80">
        <input type="number" class="res-num" placeholder="00" min="1" max="80">
        <input type="number" class="res-num" placeholder="00" min="1" max="80">
        <input type="number" class="res-num" placeholder="00" min="1" max="80">
        <br><br>
        <button onclick="conferir()">CONFERIR JOGOS</button>
        <button onclick="baixarArquivo()" class="btn-download">BAIXAR ARQUIVO DE JOGOS</button>
    </div>

    <table id="tabela-bolao">
        <thead>
            <tr>
                <th>Participante</th>
                <th colspan="5">Números</th>
                <th>Acertos</th>
            </tr>
        </thead>
        <tbody id="tabela-corpo">
            <tr><td colspan="7">Carregando dados do servidor...</td></tr>
        </tbody>
    </table>

    <div class="footer-copy">by Reinaldo Pinheiro - 2026</div>
</div>

<script>
    let apostas = [];
    let textoOriginalArquivo = ""; 

    // LINK ATUALIZADO: Aponta para o repositório reinaldopinheiro.github.io dentro da pasta bolao
    const urlArquivo = "https://raw.githubusercontent.com/reinaldopinheiro/reinaldopinheiro.github.io/main/bolao/quina.txt";

    async function carregarJogos() {
        try {
            const resposta = await fetch(urlArquivo);
            if (!resposta.ok) throw new Error('Erro ao ler arquivo');
            
            textoOriginalArquivo = await resposta.text();
            
            const linhas = textoOriginalArquivo.trim().split("\n");
            apostas = linhas.map((linha) => {
                const partes = linha.split(";");
                return {
                    nome: partes[0].trim(),
                    num: partes[1].split(",").map(n => parseInt(n.trim()))
                };
            });
            renderizarTabela();
        } catch (erro) {
            document.getElementById('tabela-corpo').innerHTML = '<tr><td colspan="7" style="color:red">Erro ao carregar dados. Verifique se o arquivo quina.txt está na pasta "bolao" no repositório reinaldopinheiro.github.io.</td></tr>';
        }
    }

    function baixarArquivo() {
        if (!textoOriginalArquivo) {
            alert("O arquivo ainda não foi carregado ou está vazio.");
            return;
        }
        
        const blob = new Blob([textoOriginalArquivo], { type: 'text/plain;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'quina.txt'; 
        link.click();
        URL.revokeObjectURL(link.href);
    }

    function renderizarTabela() {
        const corpo = document.getElementById('tabela-corpo');
        corpo.innerHTML = '';
        
        apostas.forEach(aposta => {
            let linha = `<tr>
                <td style="text-align:left; font-weight:bold;">${aposta.nome}</td>
                ${aposta.num.map(n => `<td class="num-celula">${n}</td>`).join('')}
                <td class="pontos-col">0</td>
            </tr>`;
            corpo.innerHTML += linha;
        });
    }

    function conferir() {
        const inputs = document.querySelectorAll('.res-num');
        const resultado = Array.from(inputs).map(i => parseInt(i.value)).filter(n => !isNaN(n));

        if (resultado.length < 5) {
            alert("Por favor, preencha os 5 números do resultado.");
            return;
        }

        const linhas = document.querySelectorAll('#tabela-corpo tr');

        linhas.forEach((linha, index) => {
            let acertos = 0;
            const celulasNumeros = linha.querySelectorAll('.num-celula');
            const celulaPontos = linha.querySelector('.pontos-col');

            celulasNumeros.forEach(celula => {
                const num = parseInt(celula.innerText);
                if (resultado.includes(num)) {
                    celula.classList.add('acerto');
                    acertos++;
                } else {
                    celula.classList.remove('acerto');
                }
            });

            celulaPontos.innerText = acertos;
            
            if (acertos === 3) celulaPontos.style.color = "blue";     
            if (acertos === 4) celulaPontos.style.color = "orange";   
            if (acertos === 5) celulaPontos.style.color = "green";    
            if (acertos < 3) celulaPontos.style.color = "#e74c3c";    
        });
    }

    carregarJogos();
</script>

</body>
</html>
