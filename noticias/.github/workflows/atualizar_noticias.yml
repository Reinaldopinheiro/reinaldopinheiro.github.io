name: Atualizar Noticias RPC

on:
  schedule:
    # Agenda a execução a cada 5 minutos
    - cron: '*/5 * * * *'
  workflow_dispatch: # Permite que você execute manualmente pelo painel do GitHub se quiser

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Baixa o código do repositório
    - name: Checkout repo
      uses: actions/checkout@v4

    # 2. Configura o ambiente Python
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Instala as dependências necessárias para o script
    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 lxml

    # 4. Executa o script dentro da pasta correta
    - name: Executar script de noticias
      run: |
        cd noticias
        python noticias.py

    # 5. Salva e envia o HTML atualizado de volta para o GitHub Pages
    - name: Fazer commit e push das alterações
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add noticias/noticias.html
        # Só faz o commit se houver alterações reais para evitar erros
        git diff-index --quiet HEAD || git commit -m "Automação: Noticias RPC atualizadas"
        git push