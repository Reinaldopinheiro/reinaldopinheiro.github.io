name: Atualizar Noticias RPC

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        persist-credentials: true # Garante o uso do token correto para fazer push

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Adicionado para garantir que o interpretador de XML não quebre o script no Linux
    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 lxml

    - name: Executar script de noticias
      run: |
        cd noticias
        python noticias.py

    - name: Fazer commit e push das alterações
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        
        # Garante a sincronia dos arquivos antes de tentar subir
        git pull origin main --rebase || echo "Sem atualizações remotas pendentes"
        
        # Força o rastreamento do arquivo gerado
        git add noticias/noticias.html
        
        # Faz o commit apenas se houver mudanças reais
        git diff-index --quiet HEAD || git commit -m "Automação: Noticias RPC atualizadas"
        git push origin HEAD:main