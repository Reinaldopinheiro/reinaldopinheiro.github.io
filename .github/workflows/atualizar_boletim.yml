name: Atualizar Boletim Diário

on:
  schedule:
    # 11:00 UTC equivale a 08:00 no Horário de Brasília
    - cron: '0 11 * * *'
  workflow_dispatch: # Permite rodar manualmente pelo painel do GitHub Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar o repositório
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Executar gerador do boletim
      # O comando 'working-directory' avisa o GitHub para entrar na pasta 'boletim' antes de rodar
      working-directory: ./boletim
      run: python boletim5.py

    - name: Enviar alterações para o GitHub
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # Como o script salva na mesma pasta onde está, o HTML foi gerado dentro de 'boletim/'
        git add boletim/boletim5.html
        
        # Só realiza o commit se houver alguma alteração de conteúdo
        git diff-index --quiet HEAD || git commit -m "Automação: Boletim Diário Atualizado em boletim/"
        git push