name: Atualizar Dados da Copa 2026
on:
  workflow_dispatch: # <--- ESSA LINHA EXATA É O QUE ATIVA O BOTÃO MANUAL NO GITHUB
  schedule:
  - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Clonar o Repositório
        uses: actions/checkout@v4
        with:
          persist-credentials: true # Garante que a permissão do token seja mantida para o push

      - name: 2. Configurar o Python no Servidor
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Instalar Dependências de Raspagem
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 4. Executar o Script de Atualização
        run: |
          python copa/copa26.py

 - name: 5. Enviar alterações e dar o Push de volta para o GitHub Pages
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          git config --global http.postBuffer 524288000
          
          # Garante o rastreamento correto na pasta do script
          git add copa/copa26.html
          
          if ! git diff --quiet --staged; then
            git commit -m "⚽ Automação: Atualização dos placares da Copa"
            git push origin HEAD:${{ github.ref_name }} || (sleep 5 && git push origin HEAD:${{ github.ref_name }})
          else
            echo "Nenhuma mudança detectada nos placares. Pulando push."
          fi
