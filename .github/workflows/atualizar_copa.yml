name: Atualizar Dados da Copa 2026
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Clonar o Repositório
        uses: actions/checkout@v4
      - name: 2. Configurar o Python no Servidor
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 3. Instalar Dependências de Raspagem
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
      - name: 4. Executar o Script de Atualização
        run: |
          python copa/copa26.py
     - name: 5. Enviar alterações e dar o Push de volta para o GitHub Pages
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add copa/copa.html copa/placar.json
          # O commit só acontece se houver mudanças reais, evitando erros bobos
          git diff-index --quiet HEAD || git commit -m "[Bot] Placares da Copa Atualizados via Python"
          
          # Força o download das novidades e resolve o conflito favorecendo o arquivo gerado pelo robô
          git pull origin main -X theirs --rebase
          git push origin main