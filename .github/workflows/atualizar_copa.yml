name: Atualizar Dados da Copa 2026

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Clonar o Repositório
        uses: actions/checkout@v4

      - name: 2. Configurar o Python no Servidor
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Instalar Dependências de Raspagem
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 4. Executar o Script de Atualização
        run: |
          python copa/copa26.py

      - name: 5. Enviar alterações e dar o Push de volta para o GitHub Pages
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Procura o arquivo copa.html onde quer que ele tenha sido gerado e move para o lugar certo
          if [ -f "copa.html" ]; then
            mkdir -p copa
            mv copa.html copa/copa.html
          fi
          
          # Adiciona o arquivo garante que o Git não quebre se não houver mudanças
          git add copa/copa.html
          
          # Só faz o commit se houver alguma alteração real no arquivo
          git diff --quiet && git diff --staged --quiet || (git commit -m "⚽ Automação: Atualização dos placares da Copa" && git push)