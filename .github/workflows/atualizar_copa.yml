name: Atualizar Painel da Copa 2026

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Clonar o Repositório
      uses: actions/checkout@v4
      with:
        # Garante que o repositório seja clonado com permissões ativas para push
        persist-credentials: true

    - name: 2. Configurar o Python no Servidor
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. Instalar Dependências de Raspagem
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: 4. Executar o Script de Atualização
      working-directory: copa
      run: python copa26.py

    - name: 5. Enviar alterações e dar o Push de volta para o GitHub Pages
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        
        # Resolve o problema do detached HEAD garantindo que estamos na main
        git checkout main
        
        # Adiciona o arquivo modificado apontando o caminho correto
        git add copa/copa.html
        
        # Só realiza o commit e o push se houver de fato alguma mudança nos placares
        if ! git diff-index --quiet HEAD; then
          git commit -m "🤖 [Bot] Placares da Copa Atualizados via Python"
          git push origin main
        else
          echo "Nenhuma alteração encontrada nos resultados. Pulando o push."
        fi