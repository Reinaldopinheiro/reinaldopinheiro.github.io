name: Atualizar Dados da Copa 2026

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *' # Roda a cada 5 minutos

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Baixar código do repositório
      uses: actions/checkout@v4

    - name: 2. Configurar o Python no Servidor
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 3. Instalar Dependências de Raspagem
      run: |
        python -m pip install --upgrade pip
        pip install requests urllib3 pytz
   
    - name: 4. Liberar permissão na pasta
      run: chmod -R 777 .

    # 🚨 CORRIGIDO AQUI: Adicionado o caminho "copa/" antes do script
    - name: 5. Executar o Script de Atualização
      run: python copa/copa26.py

    - name: 6. Enviar alterações e dar o Push
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        
        # 🚨 CORRIGIDO AQUI: Garante que o Git adicione o HTML dentro da pasta copa
        git add copa/copa26.html
        
        if ! git diff --quiet --cached; then
          git commit -m "⚽ Automação: Atualização dos placares da Copa"
          git push origin HEAD:main
        else
          echo "Nenhuma mudança detectada nos placares."
        fi
