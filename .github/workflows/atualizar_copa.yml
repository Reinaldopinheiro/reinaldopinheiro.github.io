name: Atualizar Dados da Copa 2026

on:
  schedule:
    # Executa a cada 6 horas (ajuste o tempo se preferir)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Permite que você clique no botão e rode manualmente quando quiser

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Clonar o Repositório
        uses: actions/checkout@v4

      - name: 2. Configurar o Python no Servidor
        uses: actions/setup-python@v5
        with:
          python-python-version: '3.10'

      - name: 3. Instalar Dependências de Raspagem
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 4. Executar o Script de Atualização
        run: |
          # Executa o script que gera o copa.html corrigido
          python copa/copa26.py

      - name: 5. Enviar alterações e dar o Push de volta para o GitHub Pages
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Adiciona o arquivo gerado (certifique-se de que o caminho 'copa/copa.html' está correto no seu script)
          git add copa/copa.html
          
          # Faz o commit apenas se houver mudanças reais no arquivo
          git commit -m "[Bot] Placares da Copa Atualizados via Python" || echo "Sem alterações para commitar"
          
          # Sincroniza com o histórico do servidor para evitar o erro '[rejected] main -> main (fetch first)'
          git pull origin main --rebase
          
          # Envia os dados atualizados com sucesso
          git push origin main