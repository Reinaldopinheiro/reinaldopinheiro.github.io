name: Atualizar Dados da Copa 2026

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

# 🚨 CRÍTICO: Dá permissão para o robô do GitHub gravar os novos arquivos no seu repositório
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar código do repositório
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Instalar dependências necessárias
      run: |
        python -m pip install --upgrade pip
        pip install requests urllib3
    
    # 🟢 ADICIONE ESTE BLOCO EXATAMENTE AQUI:
    - name: Liberar Permissao de Escrita no Linux do GitHub
      run: chmod -R 777 .
    
    - name: Executar o Script da Copa
      run: python copa/copa26.py

    # 🚨 CRÍTICO: Salva as alterações de copa26.html e placar.json de volta no repositório
    - name: Commitar e Enviar alterações para o GitHub
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Adiciona apenas os arquivos que foram atualizados ou gerados pelo script
        git add copa26.html placar.json
        
        # Verifica se houve alguma mudança real para evitar erros de commit vazio
        if ! git diff --cached --quiet; then
          git commit -m "🤖 [Bot] Tabelas atualizadas automaticamente via API"
          git push
        else
          echo "Nenhuma alteração nos placares detectada."
        fi
