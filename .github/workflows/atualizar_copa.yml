name: Atualizar Dados da Copa 2026

on:
  schedule:
    # Executa a cada 6 horas
    - cron: '0 */6 * * *'
  workflow_dispatch: # Permite que você clique no botão e rode manualmente quando quiser

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Clonar o Repositório
        uses: actions/checkout@v4

      - name: 2. Configurar o Python no Servidor
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Instalar Dependências de Raspagem
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 4. Executar o Script de Atualização
        run: |
          # Executa o script que gera o copa.html
          python copa/copa26.py

      - name: 5. Enviar alterações e dar o Push de volta para o GitHub Pages
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Garante que o Git adicione o copa.html tanto se ele for gerado na raiz quanto na pasta copa
          git add copa.html copa/copa.html 2>/dev/null || echo "Aviso: Caminho não encontrado, prosseguindo..."
          
          # Faz o commit apenas se houver mudanças reais no arquivo
          git commit -m "[Bot] Placares da Copa Atualizados via Python" || echo "Sem alterações para commitar"
          
          # Sincroniza com o histórico do servidor para evitar rejeições
          git pull origin main --rebase
          
          # Envia os dados atualizados com sucesso
          git push origin main