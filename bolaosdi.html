<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Conferidor de Bolão - Mega Sena</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f4f4; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .resultado-input { background: #fff176; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        input[type="number"] { width: 50px; padding: 8px; margin: 2px; text-align: center; border: 1px solid #ccc; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #f8f8f8; }
        
        /* Ajuste para o círculo de acerto ficar perfeito */
        .acerto { 
            background-color: #4CAF50 !important; 
            color: white !important; 
            font-weight: bold; 
            display: inline-block;
            width: 30px;
            height: 30px;
            line-height: 30px;
            border-radius: 50%;
        }
        
        .pontos-col { font-weight: bold; color: #d32f2f; }
        #info-concurso { font-weight: bold; color: #1976d2; margin-bottom: 10px; }
        tr:hover { background-color: #f9f9f9; }
        button { padding: 10px 20px; cursor: pointer; background: #1976d2; color: white; border: none; border-radius: 5px; font-weight: bold; }
        button:hover { background: #1565c0; }
    </style>
</head>
<body>

<div class="container">
    <h2>CONFERIDOR DE BOLÃO - MEGA SENA</h2>
    <p>BOLÃO DA GALERA<br>
    <h5>(C) Reinaldo Pinheiro</h5></p>

    <div id="info-concurso">Buscando dados oficiais...</div>

    <div class="resultado-input">
        <strong>RESULTADO OFICIAL:</strong><br><br>
        <input type="number" class="res-num" min="1" max="60">
        <input type="number" class="res-num" min="1" max="60">
        <input type="number" class="res-num" min="1" max="60">
        <input type="number" class="res-num" min="1" max="60">
        <input type="number" class="res-num" min="1" max="60">
        <input type="number" class="res-num" min="1" max="60">
        <br><br>
        <button onclick="conferir()">CONFERIR ACERTOS</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Jogo</th>
                <th colspan="6">Números Apostados</th>
                <th>Acertos</th>
            </tr>
        </thead>
        <tbody id="tabela-corpo"></tbody>
    </table>
</div>

<script>
    // Padronizado para "num" minúsculo para evitar erros de referência
    const apostas = [
        { nome: "Ademir", num: [7,8,14,36,48,60] },
        { nome: "Ademir2", num: [1,9,10,23,44,55] },
        { nome: "Alessandra", num: [1,7,10,22,27,28] },
		{ nome: "Andrea", num: [9,13,21,32,33,59] },
        { nome: "Andrea2", num: [1,3,11,27,42,49] },
        { nome: "Andre", num: [1,9,19,22,23,46] },
        { nome: "Andre2", num: [2,7,17,32,34,54] },
        { nome: "Eliana", num: [8,9,15,22,26,60] },
		{ nome: "Flavio", num: [5,6,13,27,30,49] },
        { nome: "Flavio2", num: [10,11,29,39,45,49] },
        { nome: "Katia", num: [1,4,10,23,45,58] },
		{ nome: "Katia2", num: [2,9,13,26,47,58] },
        { nome: "Larissa", num: [7,23,26,34,35,37] },
        { nome: "Larissa2", num: [3,6,19,21,33,48] },
        { nome: "Lucia", num: [6,9,13,23,28,37] },
        { nome: "Lucia2", num: [2,10,14,24,35,42] },
        { nome: "Margarete", num: [7,16,24,36,41,58] },
        { nome: "Margarete2", num: [2,13,21,30,49,57] },
        { nome: "Reinaldo", num: [1,6,10,23,32,52] },
        { nome: "Reinaldo2", num: [7,13,22,36,49,60] },
        { nome: "Rodrigo", num: [7,14,23,36,45,52] },
        { nome: "Rodrigo2", num: [14,17,19,33,49,51] },
        { nome: "Selma", num: [4,21,29,34,43,55] },
        { nome: "Selma2", num: [6,13,22,46,53,57] },
        { nome: "Soraya", num: [6,20,28,35,44,52] },
		{ nome: "Valquiria", num: [2,24,29,47,51,60] },
        { nome: "Valquiria2", num: [3,18,22,35,52,59] }
    ];

    async function buscarUltimoResultado() {
        try {
            const response = await fetch('https://loteriascaixa-api.herokuapp.com/api/megasena/latest');
            const data = await response.json();
            
            document.getElementById('info-concurso').innerHTML = `Concurso ${data.concurso} (${data.data})`;
            
            const inputs = document.querySelectorAll('.res-num');
            data.dezenas.forEach((num, i) => {
                if(inputs[i]) inputs[i].value = parseInt(num);
            });

            conferir();
        } catch (error) {
            document.getElementById('info-concurso').innerHTML = "Falha ao carregar API. Insira o resultado manualmente.";
        }
    }

    function renderizarTabela() {
        const corpo = document.getElementById('tabela-corpo');
        corpo.innerHTML = '';
        
        apostas.forEach((aposta, index) => {
            // Criamos as células dos números primeiro
            const celulasNumeros = aposta.num.map(n => `<td><span class="celula-num">${n}</span></td>`).join('');
            
            let linha = `<tr>
                <td>${aposta.nome}</td>
                <td>Jogo ${index + 1}</td>
                ${celulasNumeros}
                <td class="pontos-col" id="pontos-${index}">0</td>
            </tr>`;
            corpo.innerHTML += linha;
        });
    }

    function conferir() {
        const inputs = document.querySelectorAll('.res-num');
        const resultado = Array.from(inputs).map(i => parseInt(i.value)).filter(n => !isNaN(n));

        // Limpa destaques anteriores
        document.querySelectorAll('.celula-num').forEach(span => span.classList.remove('acerto'));

        apostas.forEach((aposta, index) => {
            let acertos = 0;
            const linhaAtual = document.getElementById(`pontos-${index}`).parentElement;
            const spansDaLinha = linhaAtual.querySelectorAll('.celula-num');

            spansDaLinha.forEach(span => {
                const numCel = parseInt(span.innerText);
                if (resultado.includes(numCel)) {
                    span.classList.add('acerto');
                    acertos++;
                }
            });

            document.getElementById(`pontos-${index}`).innerText = acertos;
        });
    }

    // Inicialização
    renderizarTabela();
    buscarUltimoResultado();
</script>

</body>
</html>
